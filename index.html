<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
    <!--Favicons (links properly set up favicon.io favicons in the favicons folder)-->
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <!--<link rel="manifest" href="favicons/site.webmanifest"> Commented out due to causing issues-->

    <!-- CSS -->
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="elements.css">

    <!-- JS -->
    <script src="script.js" defer></script>
</head>
<body class="text main-bg">
    <!-- Header -->
    <header class="header">
        <h1 class="heading-text">Tic Tac Toe</h1>
    </header>
    <br>
    <!-- Main Content -->
    <main class="main vertical-flexbox">
        <!-- Add your content here -->
         <div class="main-grid secondary-bg">
            <div id="cell-1" class="flexbox cell not-taken">_</div>
            <div id="cell-2" class="flexbox cell not-taken">_</div>
            <div id="cell-3" class="flexbox cell not-taken">_</div>
            <div id="cell-4" class="flexbox cell not-taken">_</div>
            <div id="cell-5" class="flexbox cell not-taken">_</div>
            <div id="cell-6" class="flexbox cell not-taken">_</div>
            <div id="cell-7" class="flexbox cell not-taken">_</div>
            <div id="cell-8" class="flexbox cell not-taken">_</div>
            <div id="cell-9" class="flexbox cell not-taken">_</div>
         </div>
         <p id="feedback" class="text body-text"></p> 
    </main>
    <br>
    <div class="flexbox">
        <button id="reset-button" class="button">RESET</button>
    </div>
</body>
</html>
